<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Upload to S3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .drop-zone p {
            color: #666;
            margin-bottom: 10px;
        }
        .drop-zone .file-name {
            color: #667eea;
            font-weight: 500;
            margin-top: 10px;
        }
        input[type="file"] {
            display: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        button:hover:not(:disabled) {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.uploading {
            background: #fff3cd;
            color: #856404;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            margin: 0;
            width: auto;
        }
        .tab:hover {
            color: #667eea;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .files-list {
            margin-top: 20px;
        }
        .file-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .file-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .file-info {
            flex: 1;
        }
        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .file-meta {
            font-size: 12px;
            color: #666;
        }
        .download-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin: 0;
        }
        .download-btn:hover {
            background: #5568d3;
        }
        .refresh-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin-bottom: 15px;
        }
        .refresh-btn:hover {
            background: #218838;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Excel Upload to S3</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('upload')">Upload</button>
            <button class="tab" onclick="switchTab('download')">Download Processed Files</button>
        </div>
        
        <div id="uploadTab" class="tab-content active">
            <form id="uploadForm">
            <div class="form-group">
                <label for="programmeName">Programme Name *</label>
                <input type="text" id="programmeName" required placeholder="Enter programme name">
            </div>
            
            <div class="form-group">
                <label for="uploadedBy">Uploaded By *</label>
                <input type="text" id="uploadedBy" required placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label>Excel File *</label>
                <div class="drop-zone" id="dropZone">
                    <p>📁 Drag & drop your Excel file here</p>
                    <p style="font-size: 12px; color: #999;">or click to browse</p>
                    <div class="file-name" id="fileName"></div>
                </div>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.xlsm">
            </div>
            
            <button type="submit" id="uploadBtn">Upload to S3</button>
        </form>
        
        <div class="status" id="status">
            <div id="statusMessage"></div>
            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>
    </div>
    
    <div id="downloadTab" class="tab-content">
        <button class="refresh-btn" onclick="loadProcessedFiles()">🔄 Refresh List</button>
        
        <div class="files-list" id="filesList">
            <div class="empty-state">Click "Refresh List" to load processed files</div>
        </div>
    </div>
</div>

    <script src="config.js?v=2"></script>
    <script>
        const API_ENDPOINT = CONFIG.API_ENDPOINT;
        const FILES_API_ENDPOINT = CONFIG.FILES_API_ENDPOINT;
        
        // Validate API endpoints are configured
        if (!API_ENDPOINT || API_ENDPOINT === 'YOUR_API_GATEWAY_URL_HERE') {
            console.error('API endpoint not configured! Please update config.js');
        } else {
            console.log('API endpoint configured:', API_ENDPOINT);
            console.log('Files API endpoint configured:', FILES_API_ENDPOINT);
        }
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const status = document.getElementById('status');
        const statusMessage = document.getElementById('statusMessage');
        const progressBar = document.getElementById('progressBar');
        const progressBarFill = document.getElementById('progressBarFill');
        const uploadBtn = document.getElementById('uploadBtn');
        
        let selectedFile = null;
        
        // Drop zone click
        dropZone.addEventListener('click', () => fileInput.click());
        
        // Drag and drop handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });
        
        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });
        
        function handleFileSelect(file) {
            const validTypes = [
                'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'application/vnd.ms-excel',
                'application/vnd.ms-excel.sheet.macroEnabled.12'
            ];
            const validExtensions = ['.xlsx', '.xls', '.xlsm'];
            const fileExtension = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            
            if (!validExtensions.includes(fileExtension)) {
                showStatus('error', '❌ Please select a valid Excel file (.xlsx, .xls, or .xlsm)');
                return;
            }
            
            if (file.size > 50 * 1024 * 1024) {
                showStatus('error', '❌ File size must be under 50MB');
                return;
            }
            
            selectedFile = file;
            fileName.textContent = `✓ ${file.name}`;
            hideStatus();
        }
        
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const programmeName = document.getElementById('programmeName').value.trim();
            const uploadedBy = document.getElementById('uploadedBy').value.trim();
            
            if (!programmeName || !uploadedBy) {
                showStatus('error', '❌ Please fill in all required fields');
                return;
            }
            
            if (!selectedFile) {
                showStatus('error', '❌ Please select a file to upload');
                return;
            }
            
            await uploadFile(programmeName, uploadedBy, selectedFile);
        });
        
        async function uploadFile(programmeName, uploadedBy, file) {
            try {
                uploadBtn.disabled = true;
                showStatus('uploading', '⏳ Requesting upload URL...');
                progressBar.style.display = 'block';
                progressBarFill.style.width = '10%';
                
                console.log('Uploading to:', API_ENDPOINT);
                console.log('Request body:', {
                    programme_name: programmeName,
                    uploaded_by: uploadedBy,
                    filename: file.name,
                    file_size: file.size
                });
                
                // Step 1: Get pre-signed URL from Lambda
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        programme_name: programmeName,
                        uploaded_by: uploadedBy,
                        filename: file.name,
                        file_size: file.size
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                if (!response.ok) {
                    const contentType = response.headers.get('content-type');
                    let errorMessage = 'Failed to get upload URL';
                    
                    if (contentType && contentType.includes('application/json')) {
                        const error = await response.json();
                        console.error('JSON error:', error);
                        errorMessage = error.error || errorMessage;
                    } else {
                        const text = await response.text();
                        console.error('Non-JSON response:', text);
                        errorMessage = `Server error (${response.status}): ${text.substring(0, 200)}`;
                    }
                    throw new Error(errorMessage);
                }
                
                const data = await response.json();
                progressBarFill.style.width = '30%';
                
                // Step 2: Upload directly to S3 using pre-signed POST
                showStatus('uploading', '⏳ Uploading to S3...');
                
                const formData = new FormData();
                Object.keys(data.fields).forEach(key => {
                    formData.append(key, data.fields[key]);
                });
                formData.append('file', file);
                
                try {
                    const uploadResponse = await fetch(data.url, {
                        method: 'POST',
                        body: formData
                    });
                    
                    // S3 returns 204 No Content on success
                    if (!uploadResponse.ok && uploadResponse.status !== 204) {
                        throw new Error(`S3 upload failed with status ${uploadResponse.status}`);
                    }
                } catch (uploadError) {
                    // CORS may prevent reading S3 response, but upload might have succeeded
                    // Check if it's a network error (which often indicates CORS, not actual failure)
                    if (uploadError.message.includes('Failed to fetch') || uploadError.message.includes('CORS')) {
                        console.log('CORS error on S3 response (upload likely succeeded):', uploadError);
                        // Continue to success - the upload probably worked
                    } else {
                        throw uploadError;
                    }
                }
                
                progressBarFill.style.width = '100%';
                
                // Success
                showStatus('success', `✅ Upload successful!<br><small>S3 Path: s3://${data.bucket}/${data.s3_key}</small>`);
                
                // Reset form
                setTimeout(() => {
                    uploadForm.reset();
                    selectedFile = null;
                    fileName.textContent = '';
                    hideStatus();
                    uploadBtn.disabled = false;
                }, 5000);
                
            } catch (error) {
                showStatus('error', `❌ Upload failed: ${error.message}`);
                uploadBtn.disabled = false;
                progressBar.style.display = 'none';
            }
        }
        
        function showStatus(type, message) {
            status.className = `status show ${type}`;
            statusMessage.innerHTML = message;
        }
        
        function hideStatus() {
            status.className = 'status';
            progressBar.style.display = 'none';
            progressBarFill.style.width = '0%';
        }
        
        // Tab switching
        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            // Load files when switching to download tab
            if (tabName === 'download') {
                loadProcessedFiles();
            }
        }
        
        // Load processed files
        async function loadProcessedFiles() {
            const filesList = document.getElementById('filesList');
            
            // Check if FILES_API_ENDPOINT is configured
            if (!FILES_API_ENDPOINT || FILES_API_ENDPOINT === 'YOUR_API_GATEWAY_URL_HERE') {
                filesList.innerHTML = '<div class="empty-state">❌ FILES_API_ENDPOINT not configured in config.js</div>';
                console.error('FILES_API_ENDPOINT not set:', FILES_API_ENDPOINT);
                return;
            }
            
            filesList.innerHTML = '<div class="empty-state">⏳ Loading files...</div>';
            
            try {
                const url = new URL(FILES_API_ENDPOINT);
                url.searchParams.append('action', 'list');
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Failed to load files');
                }
                
                const data = await response.json();
                
                if (data.files.length === 0) {
                    filesList.innerHTML = '<div class="empty-state">No processed files found</div>';
                    return;
                }
                
                filesList.innerHTML = '';
                data.files.forEach(file => {
                    const fileItem = document.createElement('div');
                    fileItem.className = 'file-item';
                    
                    const fileName = file.key.split('/').pop();
                    const lastModified = new Date(file.last_modified).toLocaleString();
                    const sizeKB = (file.size / 1024).toFixed(2);
                    
                    fileItem.innerHTML = `
                        <div class="file-info">
                            <div class="file-name">📄 ${fileName}</div>
                            <div class="file-meta">
                                Programme: ${file.programme_name || 'N/A'} | 
                                Uploaded by: ${file.uploaded_by || 'N/A'} | 
                                Last modified: ${lastModified} | 
                                Size: ${sizeKB} KB
                            </div>
                        </div>
                        <button class="download-btn" onclick="downloadFile('${file.key}', '${fileName}')">
                            ⬇️ Download
                        </button>
                    `;
                    
                    filesList.appendChild(fileItem);
                });
                
            } catch (error) {
                filesList.innerHTML = `<div class="empty-state">❌ Error loading files: ${error.message}</div>`;
            }
        }
        
        // Download file
        async function downloadFile(fileKey, fileName) {
            try {
                const url = new URL(FILES_API_ENDPOINT);
                url.searchParams.append('action', 'download');
                url.searchParams.append('file_key', fileKey);
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Failed to get download URL');
                }
                
                const data = await response.json();
                
                // Create temporary link and trigger download
                const a = document.createElement('a');
                a.href = data.download_url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
            } catch (error) {
                alert(`Download failed: ${error.message}`);
            }
        }
    </script>
</body>
</html>
